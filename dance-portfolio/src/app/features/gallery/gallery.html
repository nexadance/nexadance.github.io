<section class="py-20 px-6 max-w-7xl mx-auto">
  <div class="text-center mb-12">
    <h2 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-slate-900 via-blue-900 to-blue-700">Galeria</h2>
    <div class="w-16 h-1 bg-gradient-to-r from-blue-600 to-indigo-600 mx-auto rounded-full mt-4"></div>
  </div>

  <!-- Filtros Principais (Eventos) -->
  <div class="flex flex-wrap justify-center gap-3 mb-6">
    <button
      *ngFor="let cat of categories"
      (click)="setCategory(cat)"
      [class]="activeCategory === cat ? 'filter-btn active' : 'filter-btn'"
    >
      {{ cat }}
    </button>
  </div>

  <!-- Filtros Secundários (Subcategorias/Shows) -->
  <div *ngIf="currentSubCategories.length > 0" class="flex flex-wrap justify-center gap-2 mb-10 animate-fade-in">
    <button
      (click)="setSubCategory('todos')"
      [class]="activeSubCategory === 'todos' ? 'sub-filter-btn active' : 'sub-filter-btn'"
    >
      Todos os Shows
    </button>
    <button
      *ngFor="let sub of currentSubCategories"
      (click)="setSubCategory(sub)"
      [class]="activeSubCategory === sub ? 'sub-filter-btn active' : 'sub-filter-btn'"
    >
      {{ sub }}
    </button>
  </div>

  <!-- Grid Responsivo -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <div
      *ngFor="let item of visibleItems; let i = index"
      (click)="openLightbox(i)"
      class="gallery-card group surface-card"
    >
      <div class="gallery-image-wrapper">
        <img
          [src]="item.image"
          [alt]="item.title"
          loading="lazy"
          class="gallery-image"
        />
      </div>
      <div class="gallery-overlay">
        <div class="gallery-overlay-content">
          <span class="gallery-category-tag" *ngIf="item.subCategory">{{ item.subCategory }}</span>
          <span class="gallery-category-tag" *ngIf="!item.subCategory">{{ item.category }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Paginação / Carregar Mais -->
  <div *ngIf="filteredItems.length > visibleCount" class="text-center mt-12">
    <button (click)="loadMore()" class="load-more-btn">
      Carregar Mais ({{ filteredItems.length - visibleCount }} restantes)
    </button>
  </div>

  <!-- Lightbox -->
  <div
    *ngIf="selectedImage"
    (click)="closeLightbox()"
    class="lightbox-overlay"
  >
    <!-- Botão Fechar -->
    <button
      (click)="closeLightbox()"
      class="lightbox-close-btn"
      aria-label="Fechar galeria"
    >
      ✕
    </button>

    <!-- Botão Anterior -->
    <button
      (click)="prevImage($event)"
      class="lightbox-nav-btn prev"
      aria-label="Imagem anterior"
    >
      ‹
    </button>

    <!-- Conteúdo Principal -->
    <div (click)="$event.stopPropagation()" class="lightbox-content">
      <img [src]="selectedImage.image" [alt]="selectedImage.title" class="lightbox-image" />
      
      <div class="lightbox-info">
        <p class="lightbox-title">{{ selectedImage.subCategory || selectedImage.category }}</p>
        <p class="lightbox-counter">
          Imagem {{ selectedImageIndex! + 1 }} de {{ filteredItems.length }}
        </p>
      </div>
    </div>

    <!-- Botão Próximo -->
    <button
      (click)="nextImage($event)"
      class="lightbox-nav-btn next"
      aria-label="Próxima imagem"
    >
      ›
    </button>
  </div>
</section>
