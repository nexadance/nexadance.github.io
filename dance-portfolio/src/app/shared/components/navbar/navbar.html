      <a routerLink="/" class="brand-logo flex items-center gap-3">
        <span class="logo-wrapper"><span class="logo-mask"></span></span>

      </a>

      <!-- Menu Desktop -->
      <ul class="hidden md:flex items-center space-x-8">
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
        </li>
        <li>
          <a routerLink="/sobre" routerLinkActive="active" class="nav-link">Sobre</a>
        </li>
        <li>
          <a routerLink="/conquistas" routerLinkActive="active" class="nav-link">Conquistas</a>

        <li>

        </li>
        <li>
          <a routerLink="/galeria" routerLinkActive="active" class="nav-link">Galeria</a>
        </li>
        <li>
          <a routerLink="/contato" routerLinkActive="active" class="nav-link">Contato</a>
        </li>
        <li>
          <a routerLink="/parcerias" routerLinkActive="active" class="nav-btn">Seja Parceiro</a>
        </li>
      </ul>

      <!-- Menu Mobile Button (CSS Animated) -->
      <button
        (click)="toggleMenu()"
        class="mobile-menu-btn md:hidden"
        [class.open]="isOpen()"
        aria-label="Toggle menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Menu Mobile (Animated Overlay) -->
    <div class="mobile-menu md:hidden" [class.open]="isOpen()">
      <ul class="space-y-5 px-6 py-6 border-t border-slate-800/40 mt-4">
        <li>
          <a routerLink="/" (click)="isOpen.set(false)" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="mobile-nav-link">Home</a>
        </li>
        <li>
          <a routerLink="/sobre" (click)="isOpen.set(false)" routerLinkActive="active" class="mobile-nav-link">Sobre</a>

        </li>
        <li>

        </li>
        <li>
          <a routerLink="/galeria" (click)="isOpen.set(false)" routerLinkActive="active" class="mobile-nav-link">Galeria</a>
        </li>
        <li>
          <a routerLink="/contato" (click)="isOpen.set(false)" routerLinkActive="active" class="mobile-nav-link">Contato</a>
